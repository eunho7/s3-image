spring:
  application:
    name: s3-image
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/s3_image?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.image.entity
  configuration:
    map-underscore-to-camel-case: true

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET}

app:
  image:
    public-base-url: ${IMAGE_PUBLIC_BASE_URL}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
